---
- name: apt-get update
  apt:
    update_cache: yes
- name: apt upgrade or something
  apt:
    upgrade: safe
- name: install packages
  apt:
    name:
      - python3-gpiozero
      # lgpio is gpiozero's pin factory on recent Pi OS
      - python3-lgpio
      - python3-pip
      - supervisor
      - puredata
- name: additional python packages
  ansible.builtin.pip:
    break_system_packages: true
    name:
      - python-osc
      - transitions
